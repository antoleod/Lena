    <script>
      (function normalizeSpaRedirect() {
        var redirect = window.location.search;
        if (!redirect || redirect.indexOf('/?') !== -1 || redirect.indexOf('?/') === -1) return;

        var decoded = redirect
          .slice(1)
          .replace(/^\/?\?\/?/, '/')
          .replace(/~and~/g, '&');

        var target = window.location.pathname.replace(/\/$/, '') + decoded + window.location.hash;
        window.history.replaceState(null, '', target);
      })();
    </script>
