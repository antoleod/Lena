<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="grad-biblio-bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <linearGradient id="grad-biblio-book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="grad-biblio-cover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="grad-biblio-star" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow-biblio">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4C1D95" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-biblio">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#A855F7" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad-biblio-bg)" filter="url(#shadow-biblio)"/>

  <!-- Dark shadow base inside circle -->
  <ellipse cx="64" cy="110" rx="42" ry="8" fill="#000" opacity="0.2"/>

  <!-- Book shadow -->
  <ellipse cx="64" cy="88" rx="30" ry="5" fill="#000" opacity="0.15"/>

  <!-- Book left page -->
  <path d="M36 52 Q36 46 42 46 L63 46 L63 84 L42 84 Q36 84 36 78 Z" fill="url(#grad-biblio-book)"/>

  <!-- Book right page -->
  <path d="M65 46 L86 46 Q92 46 92 52 L92 78 Q92 84 86 84 L65 84 Z" fill="#F5F3FF"/>

  <!-- Book spine -->
  <rect x="61" y="44" width="6" height="42" rx="2" fill="url(#grad-biblio-cover)"/>

  <!-- Spine highlight -->
  <rect x="62" y="46" width="2" height="38" rx="1" fill="#fff" opacity="0.3"/>

  <!-- Left page lines -->
  <line x1="43" y1="56" x2="60" y2="56" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="61" x2="60" y2="61" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="66" x2="60" y2="66" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="71" x2="60" y2="71" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="76" x2="57" y2="76" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right page lines -->
  <line x1="68" y1="56" x2="85" y2="56" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="61" x2="85" y2="61" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="66" x2="85" y2="66" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="71" x2="85" y2="71" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="76" x2="82" y2="76" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Floating letter A -->
  <circle cx="36" cy="35" r="10" fill="#7C3AED" opacity="0.9" filter="url(#glow-biblio)"/>
  <text x="36" y="39" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDE68A" text-anchor="middle">A</text>

  <!-- Floating letter B -->
  <circle cx="64" cy="26" r="9" fill="#6D28D9" opacity="0.9" filter="url(#glow-biblio)"/>
  <text x="64" y="30" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FDE68A" text-anchor="middle">B</text>

  <!-- Floating letter C -->
  <circle cx="92" cy="35" r="10" fill="#7C3AED" opacity="0.9" filter="url(#glow-biblio)"/>
  <text x="92" y="39" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#FDE68A" text-anchor="middle">C</text>

  <!-- Star 1 -->
  <polygon points="22,55 24,61 30,61 25,65 27,71 22,67 17,71 19,65 14,61 20,61" fill="url(#grad-biblio-star)" opacity="0.95"/>

  <!-- Star 2 -->
  <polygon points="106,55 107.5,59.5 112,59.5 108.5,62 110,66.5 106,64 102,66.5 103.5,62 100,59.5 104.5,59.5" fill="url(#grad-biblio-star)" opacity="0.95"/>

  <!-- Star 3 -->
  <polygon points="64,88 65.5,93 70,93 66.5,96 68,101 64,98 60,101 61.5,96 58,93 62.5,93" fill="url(#grad-biblio-star)" opacity="0.8"/>

  <!-- Magic sparkles -->
  <circle cx="28" cy="75" r="2" fill="#FDE68A" opacity="0.8"/>
  <circle cx="100" cy="72" r="2" fill="#FDE68A" opacity="0.8"/>
  <circle cx="50" cy="18" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="80" cy="20" r="1.5" fill="#fff" opacity="0.7"/>

  <!-- Top highlight on circle -->
  <ellipse cx="54" cy="24" rx="28" ry="14" fill="#fff" opacity="0.15"/>

  <!-- Bottom page glow open effect -->
  <ellipse cx="64" cy="85" rx="20" ry="3" fill="#A855F7" opacity="0.25"/>
</svg>
