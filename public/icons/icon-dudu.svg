<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="grad-dudu-bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </radialGradient>
    <linearGradient id="grad-dudu-ten" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="grad-dudu-one" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="grad-dudu-minus" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FECDD3"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="grad-dudu-num" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow-dudu">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#831843" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow-block-d">
      <feDropShadow dx="1" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad-dudu-bg)" filter="url(#shadow-dudu)"/>
  <ellipse cx="64" cy="112" rx="42" ry="7" fill="#000" opacity="0.2"/>

  <!-- Block shadows on ground -->
  <ellipse cx="44" cy="87" rx="20" ry="4" fill="#000" opacity="0.12"/>
  <ellipse cx="88" cy="87" rx="14" ry="3" fill="#000" opacity="0.12"/>

  <!-- TENS BLOCK (big "10") -->
  <rect x="22" y="46" width="42" height="38" rx="8" fill="url(#grad-dudu-ten)" filter="url(#shadow-block-d)"/>
  <!-- Tens block top highlight -->
  <rect x="25" y="49" width="36" height="13" rx="5" fill="#fff" opacity="0.3"/>
  <!-- Tens block grid pattern -->
  <line x1="32" y1="50" x2="32" y2="82" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="50" x2="42" y2="82" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <line x1="52" y1="50" x2="52" y2="82" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="59" x2="64" y2="59" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="68" x2="64" y2="68" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="77" x2="64" y2="77" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <!-- "10" label -->
  <text x="43" y="72" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">10</text>

  <!-- MINUS SIGN -->
  <rect x="67" y="60" width="16" height="8" rx="4" fill="url(#grad-dudu-minus)" filter="url(#shadow-block-d)"/>
  <rect x="68" y="61" width="14" height="4" rx="2" fill="#fff" opacity="0.4"/>

  <!-- UNITS BLOCK (small "1") -->
  <rect x="84" y="53" width="24" height="28" rx="6" fill="url(#grad-dudu-one)" filter="url(#shadow-block-d)"/>
  <!-- Units block top highlight -->
  <rect x="87" y="56" width="18" height="9" rx="4" fill="#fff" opacity="0.3"/>
  <!-- "1" label -->
  <text x="96" y="74" font-family="Arial Black, Arial" font-size="18" font-weight="900" fill="#fff" text-anchor="middle">1</text>

  <!-- Floating numbers falling -->
  <text x="30" y="35" font-family="Arial Black, Arial" font-size="13" font-weight="900" fill="#FDE68A" text-anchor="middle" opacity="0.9" transform="rotate(-10, 30, 35)">5</text>
  <text x="90" y="32" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#FDE68A" text-anchor="middle" opacity="0.85" transform="rotate(8, 90, 32)">3</text>
  <text x="106" y="55" font-family="Arial Black, Arial" font-size="10" font-weight="900" fill="#FDE68A" text-anchor="middle" opacity="0.8" transform="rotate(15, 106, 55)">8</text>

  <!-- DuDu character hint - small monster face above -->
  <circle cx="64" cy="28" r="13" fill="#FB7185" opacity="0.9" filter="url(#shadow-block-d)"/>
  <circle cx="64" cy="28" r="13" fill="none" stroke="#F43F5E" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="59" cy="26" r="3.5" fill="#fff"/>
  <circle cx="69" cy="26" r="3.5" fill="#fff"/>
  <circle cx="60" cy="26" r="2" fill="#1E1B4B"/>
  <circle cx="70" cy="26" r="2" fill="#1E1B4B"/>
  <circle cx="60.5" cy="25" r="0.8" fill="#fff"/>
  <circle cx="70.5" cy="25" r="0.8" fill="#fff"/>
  <!-- Smile -->
  <path d="M58 32 Q64 37 70 32" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Horns -->
  <polygon points="57,16 54,10 60,15" fill="#F43F5E"/>
  <polygon points="71,16 74,10 68,15" fill="#F43F5E"/>
  <!-- Highlight on face -->
  <ellipse cx="60" cy="21" rx="7" ry="4" fill="#fff" opacity="0.2"/>

  <!-- Result display -->
  <rect x="40" y="92" width="48" height="18" rx="9" fill="#BE185D" opacity="0.7"/>
  <rect x="42" y="94" width="44" height="7" rx="5" fill="#fff" opacity="0.15"/>
  <text x="64" y="105" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#FDE68A" text-anchor="middle">= 9</text>

  <!-- Top highlight on circle -->
  <ellipse cx="54" cy="24" rx="28" ry="13" fill="#fff" opacity="0.14"/>
</svg>
