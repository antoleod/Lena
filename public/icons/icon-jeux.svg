<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="grad-jeux-bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#6B21A8"/>
    </radialGradient>
    <linearGradient id="grad-jeux-brain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="grad-jeux-bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="100%" stop-color="#CA8A04"/>
    </linearGradient>
    <linearGradient id="grad-jeux-puzzle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow-jeux">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3B0764" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-bolt">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FEF08A" flood-opacity="0.8"/>
    </filter>
    <filter id="shadow-brain">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#6B21A8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad-jeux-bg)" filter="url(#shadow-jeux)"/>
  <ellipse cx="64" cy="112" rx="42" ry="7" fill="#000" opacity="0.2"/>

  <!-- Brain shadow -->
  <ellipse cx="64" cy="90" rx="28" ry="5" fill="#000" opacity="0.15"/>

  <!-- LEFT BRAIN HEMISPHERE -->
  <path d="
    M64 82
    Q50 82 44 76
    Q36 70 36 62
    Q36 54 40 49
    Q44 44 50 42
    Q56 40 60 43
    Q62 45 64 48
    L64 82 Z
  " fill="url(#grad-jeux-brain)" filter="url(#shadow-brain)"/>

  <!-- Right brain hemisphere -->
  <path d="
    M64 82
    Q78 82 84 76
    Q92 70 92 62
    Q92 54 88 49
    Q84 44 78 42
    Q72 40 68 43
    Q66 45 64 48
    L64 82 Z
  " fill="#DDD6FE"/>

  <!-- Brain fold lines left -->
  <path d="M42 62 Q46 56 50 60 Q54 64 52 70" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <path d="M44 52 Q48 58 45 64" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 44 Q56 50 54 57" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Brain fold lines right -->
  <path d="M86 62 Q82 56 78 60 Q74 64 76 70" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round"/>
  <path d="M84 52 Q80 58 83 64" fill="none" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M78 44 Q72 50 74 57" fill="none" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center division line -->
  <line x1="64" y1="48" x2="64" y2="82" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round"/>

  <!-- Brain stem -->
  <rect x="60" y="80" width="8" height="10" rx="4" fill="#C084FC"/>

  <!-- Friendly eyes - left -->
  <ellipse cx="52" cy="63" rx="6" ry="7" fill="#fff"/>
  <circle cx="53" cy="63" r="4" fill="#7E22CE"/>
  <circle cx="54" cy="61" r="1.5" fill="#fff"/>
  <!-- Eye shine -->
  <ellipse cx="52" cy="59" rx="4" ry="2" fill="#fff" opacity="0.3"/>

  <!-- Friendly eyes - right -->
  <ellipse cx="76" cy="63" rx="6" ry="7" fill="#fff"/>
  <circle cx="75" cy="63" r="4" fill="#7E22CE"/>
  <circle cx="76" cy="61" r="1.5" fill="#fff"/>
  <ellipse cx="76" cy="59" rx="4" ry="2" fill="#fff" opacity="0.3"/>

  <!-- Smile -->
  <path d="M55 74 Q64 80 73 74" fill="none" stroke="#7E22CE" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <g filter="url(#glow-bolt)">
    <polygon points="68,32 60,52 66,52 60,72 76,48 69,48 76,32" fill="url(#grad-jeux-bolt)"/>
    <polygon points="68,32 60,52 66,52 60,72 76,48 69,48 76,32" fill="none" stroke="#D97706" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Puzzle piece top-left -->
  <g transform="translate(20,22)">
    <path d="M0 0 L14 0 L14 6 Q17 6 17 9 Q17 12 14 12 L14 18 L0 18 L0 12 Q-3 12 -3 9 Q-3 6 0 6 Z" fill="url(#grad-jeux-puzzle)" opacity="0.9"/>
    <rect x="1" y="1" width="12" height="6" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Puzzle piece top-right -->
  <g transform="translate(94,22)">
    <path d="M0 0 L14 0 L14 6 Q17 6 17 9 Q17 12 14 12 L14 18 L0 18 L0 12 Q-3 12 -3 9 Q-3 6 0 6 Z" fill="#60A5FA" opacity="0.9"/>
    <rect x="1" y="1" width="12" height="6" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Puzzle piece bottom -->
  <g transform="translate(56,96)">
    <path d="M0 0 L16 0 L16 5 Q19 5 19 8 Q19 11 16 11 L16 16 L0 16 Z" fill="#4ADE80" opacity="0.9"/>
    <rect x="1" y="1" width="14" height="5" rx="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Star sparkles -->
  <circle cx="22" cy="75" r="2.5" fill="#FDE68A" opacity="0.9"/>
  <circle cx="106" cy="75" r="2.5" fill="#FDE68A" opacity="0.9"/>
  <circle cx="35" cy="95" r="2" fill="#FDE68A" opacity="0.7"/>

  <!-- Top highlight on circle -->
  <ellipse cx="54" cy="24" rx="28" ry="13" fill="#fff" opacity="0.14"/>
</svg>
