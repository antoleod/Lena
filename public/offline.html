<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff8fc6" />
  <title>Hors-ligne — Lena</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Nunito, system-ui, sans-serif;
      background: #fff8fd;
      color: #3d2c4e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 1.25rem;
    }
    .icon { font-size: 4rem; line-height: 1; }
    h1 { font-size: 1.75rem; font-weight: 800; color: #c0396b; }
    p { font-size: 1rem; line-height: 1.6; max-width: 26ch; color: #5a4070; }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #ff8fc6;
      color: #fff;
      border-radius: 999px;
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      box-shadow: 0 4px 0 #c0396b;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    a:active { transform: translateY(3px); box-shadow: 0 1px 0 #c0396b; }
  </style>
</head>
<body>
  <div class="icon">🌸</div>
  <h1>Tu es hors-ligne</h1>
  <p>Pas de connexion Internet pour l'instant. Tu peux continuer à jouer avec les contenus déjà téléchargés !</p>
  <a href="./">Retourner à l'accueil</a>
</body>
</html>
