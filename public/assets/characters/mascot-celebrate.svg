<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mascotCelebGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <circle cx="60" cy="70" r="35" fill="url(#mascotCelebGrad)" opacity="0.9"/>
  <!-- Head -->
  <circle cx="60" cy="35" r="25" fill="url(#mascotCelebGrad)" opacity="0.95"/>
  <!-- Eyes - happy/excited -->
  <circle cx="50" cy="30" r="4" fill="#FFF"/>
  <circle cx="70" cy="30" r="4" fill="#FFF"/>
  <circle cx="50" cy="31" r="2" fill="#000" opacity="0.8"/>
  <circle cx="70" cy="31" r="2" fill="#000" opacity="0.8"/>
  <!-- Smile - big -->
  <path d="M 45 42 Q 60 52 75 42" stroke="#FFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Arms raised -->
  <path d="M 25 50 Q 15 40 20 20" stroke="url(#mascotCelebGrad)" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 95 50 Q 105 40 100 20" stroke="url(#mascotCelebGrad)" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Hands -->
  <circle cx="20" cy="18" r="8" fill="url(#mascotCelebGrad)" opacity="0.9"/>
  <circle cx="100" cy="18" r="8" fill="url(#mascotCelebGrad)" opacity="0.9"/>
</svg>
