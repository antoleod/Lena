<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="headGradCeleb" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffd1ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffb3d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e66a9d;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="bodyGradCeleb" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ffcceb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff85b8;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="hornGradCeleb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="30%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc8800;stop-opacity:1" />
    </linearGradient>
    <style>
      .shine { transition: transform 0.4s ease-out; }
      svg:hover .shine { transform: translate(4px, -4px); }
      .character-body {
        animation: breathe 3.2s ease-in-out infinite;
        transform-origin: 100px 220px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1) translateY(0); }
        50% { transform: scale(1.04, 1.06) translateY(-4px); }
      }
    </style>
    <filter id="shadowCeleb" x="-50%" y="-50%" width="250%" height="250%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Confetti pieces (celebration) -->
  <circle cx="30" cy="20" r="4" fill="#ffd700" opacity="0.7"/>
  <circle cx="170" cy="25" r="4" fill="#ff69b4" opacity="0.7"/>
  <circle cx="50" cy="10" r="3" fill="#ffed4e" opacity="0.7"/>
  <circle cx="150" cy="15" r="3" fill="#ff85b8" opacity="0.7"/>
  <circle cx="100" cy="5" r="3" fill="#ffd700" opacity="0.7"/>

  <g class="character-body">
  <!-- Body (tilted slightly) -->
  <ellipse cx="100" cy="170" rx="42" ry="50" fill="#ffb3d9" opacity="0.85" transform="rotate(-5 100 170)"/>
  <ellipse cx="100" cy="160" rx="38" ry="30" fill="#ffcceb" opacity="0.5" transform="rotate(-5 100 160)"/>

  <!-- Head (tilted for celebration) -->
  <circle cx="100" cy="85" r="55" fill="url(#headGradCeleb)" filter="url(#shadowCeleb)" transform="rotate(-8 100 85)"/>

  <!-- Head shine (3D effect) -->
  <ellipse cx="70" cy="60" rx="25" ry="30" fill="#ffcceb" opacity="0.5" transform="rotate(-8 70 60)"/>

  <!-- Left ear back -->
  <ellipse cx="60" cy="40" rx="16" ry="28" fill="#ff85b8" transform="rotate(-30 60 40) rotate(-8 60 40)"/>
  <!-- Left ear front -->
  <ellipse cx="60" cy="42" rx="10" ry="20" fill="#ffcceb" transform="rotate(-30 60 42) rotate(-8 60 42)"/>

  <!-- Right ear back -->
  <ellipse cx="140" cy="40" rx="16" ry="28" fill="#ff85b8" transform="rotate(30 140 40) rotate(-8 140 40)"/>
  <!-- Right ear front -->
  <ellipse cx="140" cy="42" rx="10" ry="20" fill="#ffcceb" transform="rotate(30 140 42) rotate(-8 140 42)"/>

  <!-- Horn (tilted) -->
  <polygon points="100,15 94,75 106,75" fill="url(#hornGradCeleb)" filter="url(#shadowCeleb)" transform="rotate(-8 100 40)"/>
  <!-- Horn shine line -->
  <polygon points="100,20 99,65 101,65" fill="#ffffff" opacity="0.6" transform="rotate(-8 100 40)"/>

  <!-- Left eye white -->
  <circle cx="78" cy="78" r="11" fill="#ffffff" filter="url(#shadowCeleb)" transform="rotate(-8 78 78)"/>
  <!-- Left eye iris -->
  <circle cx="78" cy="80" r="6" fill="#4a3a5f" transform="rotate(-8 78 80)"/>
  <!-- Left eye highlight (big for excitement) -->
  <circle cx="80" cy="76" r="4" fill="#ffffff" transform="rotate(-8 80 76)"/>

  <!-- Right eye white -->
  <circle cx="122" cy="78" r="11" fill="#ffffff" filter="url(#shadowCeleb)" transform="rotate(-8 122 78)"/>
  <!-- Right eye iris -->
  <circle cx="122" cy="80" r="6" fill="#4a3a5f" transform="rotate(-8 122 80)"/>
  <!-- Right eye highlight (big for excitement) -->
  <circle cx="124" cy="76" r="4" fill="#ffffff" transform="rotate(-8 124 76)"/>

  <!-- Left eye stars (excited) -->
  <circle cx="70" cy="70" r="2" fill="#ffd700" opacity="0.8" transform="rotate(-8 70 70)"/>
  <!-- Right eye stars (excited) -->
  <circle cx="130" cy="70" r="2" fill="#ffd700" opacity="0.8" transform="rotate(-8 130 70)"/>

  <!-- Nose (pink triangle) -->
  <polygon points="100,105 96,113 104,113" fill="#ff69b4" filter="url(#shadowCeleb)" transform="rotate(-8 100 109)"/>

  <!-- HUGE celebration smile -->
  <path d="M 75 120 Q 100 145 125 120" stroke="#ff69b4" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Smile fill with tongue -->
  <path d="M 75 120 Q 100 145 125 120 L 125 132 Q 100 155 75 132 Z" fill="#ff69b4" opacity="0.25"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="140" rx="8" ry="6" fill="#ff69b4" opacity="0.6"/>

  <!-- Left whiskers (fluttery) -->
  <line x1="48" y1="85" x2="15" y2="75" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="48" y1="98" x2="10" y2="105" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="48" y1="111" x2="15" y2="130" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Right whiskers (fluttery) -->
  <line x1="152" y1="85" x2="185" y2="75" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="152" y1="98" x2="190" y2="105" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="152" y1="111" x2="185" y2="130" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Left blush (HUGE for celebration) -->
  <circle cx="45" cy="98" r="16" fill="#ff69b4" opacity="0.5" filter="url(#shadowCeleb)"/>
  <!-- Right blush (HUGE for celebration) -->
  <circle cx="155" cy="98" r="16" fill="#ff69b4" opacity="0.5" filter="url(#shadowCeleb)"/>

  <!-- Celebration eyebrows (raised high) -->
  <path d="M 70 60 Q 78 50 86 60" stroke="#ff85b8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 114 60 Q 122 50 130 60" stroke="#ff85b8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Left arm raised (celebrating) -->
  <path d="M 55 145 Q 40 110 35 50" stroke="#ffb3d9" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8" filter="url(#shadowCeleb)"/>
  <!-- Left hand -->
  <circle cx="32" cy="45" r="10" fill="#ffb3d9" opacity="0.85" filter="url(#shadowCeleb)"/>

  <!-- Right arm raised (celebrating) -->
  <path d="M 145 145 Q 160 110 165 50" stroke="#ffb3d9" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8" filter="url(#shadowCeleb)"/>
  <!-- Right hand -->
  <circle cx="168" cy="45" r="10" fill="#ffb3d9" opacity="0.85" filter="url(#shadowCeleb)"/>
  </g>
</svg>
