<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Advanced 3D Gradients -->
    <radialGradient id="headGrad3D" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#fff9fd;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#ffd1ea;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#ffb3d9;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#ff95ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc5588;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="headShade3D" cx="50%" cy="70%" r="60%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0);stop-opacity:0" />
      <stop offset="70%" style="stop-color:rgba(200,100,150,0);stop-opacity:0" />
      <stop offset="100%" style="stop-color:rgba(150,80,120,0.3);stop-opacity:0.3" />
    </radialGradient>

    <radialGradient id="bodyGrad3D" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#ffecf5;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#ffcceb;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffb3d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7fa8;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="bodyShade3D" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0);stop-opacity:0" />
      <stop offset="100%" style="stop-color:rgba(150,70,110,0.25);stop-opacity:0.25" />
    </radialGradient>

    <linearGradient id="hornGrad3D" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="10%" style="stop-color:#fffacd;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#ffed4e;stop-opacity:0.95" />
      <stop offset="65%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#d99500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5a00;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="hornShade3D" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(150,70,50,0);stop-opacity:0" />
      <stop offset="50%" style="stop-color:rgba(150,70,50,0.15);stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:rgba(100,50,30,0.4);stop-opacity:0.4" />
    </linearGradient>

    <!-- Shadow Filters -->
    <filter id="dropShadow3D" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerShadow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.2" result="offsetcolor"/>
      <feComposite in="offsetcolor" in2="offsetblur" operator="in" result="offsetblur"/>
      <feComposite in="offsetblur" in2="SourceAlpha" operator="in" result="offsetblur"/>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow3D" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animations -->
    <style>
      @keyframes float3D {
        0%, 100% { transform: translateY(0px) rotateX(0deg); }
        50% { transform: translateY(-5px) rotateX(2deg); }
      }
      @keyframes twinkle3D {
        0%, 100% { opacity: 0.3; filter: brightness(1); }
        50% { opacity: 1; filter: brightness(1.3); }
      }
      @keyframes rotate3D {
        0% { transform: rotateY(0deg); }
        100% { transform: rotateY(360deg); }
      }
      .shine { transition: transform 0.4s ease-out; }
      svg:hover .shine { transform: translate(5px, -5px) scale(1.1); }
      .char-body { animation: float3D 3.5s ease-in-out infinite; }
      .sparkle3D { animation: twinkle3D 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Confetti (celebration) -->
  <circle cx="25" cy="15" r="4" fill="#ffd700" opacity="0.8" class="sparkle3D"/>
  <circle cx="175" cy="20" r="4" fill="#ff69b4" opacity="0.8" class="sparkle3D"/>
  <circle cx="45" cy="8" r="3" fill="#ffed4e" opacity="0.8" class="sparkle3D"/>
  <circle cx="155" cy="12" r="3" fill="#00d4ff" opacity="0.8" class="sparkle3D"/>
  <circle cx="100" cy="3" r="3" fill="#ffd700" opacity="0.8" class="sparkle3D"/>

  <g class="char-body">
    <!-- Body base (bottom) shadow for depth -->
    <ellipse cx="100" cy="175" rx="45" ry="55" fill="#000000" opacity="0.08" transform="rotate(-5 100 175)"/>

    <!-- Body 3D -->
    <ellipse cx="100" cy="170" rx="42" ry="50" fill="url(#bodyGrad3D)" filter="url(#dropShadow3D)" transform="rotate(-5 100 170)"/>

    <!-- Body bottom shadow (inner 3D) -->
    <ellipse cx="100" cy="190" rx="38" ry="18" fill="url(#bodyShade3D)" transform="rotate(-5 100 190)"/>

    <!-- Body highlight (top light) -->
    <ellipse cx="90" cy="155" rx="28" ry="35" fill="#ffffff" opacity="0.25" transform="rotate(-15 90 155)"/>

    <!-- Head 3D base shadow -->
    <circle cx="100" cy="85" r="57" fill="#000000" opacity="0.1" filter="url(#dropShadow3D)" transform="rotate(-8 100 85)"/>

    <!-- Head main 3D -->
    <circle cx="100" cy="85" r="55" fill="url(#headGrad3D)" filter="url(#dropShadow3D)" transform="rotate(-8 100 85)"/>

    <!-- Head bottom shadow for depth -->
    <ellipse cx="100" cy="135" rx="50" ry="20" fill="url(#headShade3D)" transform="rotate(-8 100 135)"/>

    <!-- Head highlight (light reflection) -->
    <ellipse class="shine" cx="72" cy="52" rx="22" ry="28" fill="#ffffff" opacity="0.45" transform="rotate(-25 72 52)"/>
    <circle class="shine" cx="68" cy="48" r="7" fill="#ffffff" opacity="0.6"/>

    <!-- Left ear shadow/depth -->
    <ellipse cx="55" cy="42" rx="14" ry="26" fill="#cc5588" opacity="0.4" transform="rotate(-35 55 42)"/>
    <!-- Left ear 3D -->
    <ellipse cx="60" cy="40" rx="16" ry="28" fill="#ff85b8" transform="rotate(-30 60 40) rotate(-8 60 40)" filter="url(#dropShadow3D)"/>
    <ellipse cx="60" cy="42" rx="10" ry="20" fill="#ffcceb" transform="rotate(-30 60 42) rotate(-8 60 42)"/>
    <!-- Left ear inner shadow -->
    <ellipse cx="58" cy="45" rx="6" ry="12" fill="#ff5588" opacity="0.3" transform="rotate(-30 58 45)"/>

    <!-- Right ear shadow/depth -->
    <ellipse cx="145" cy="42" rx="14" ry="26" fill="#cc5588" opacity="0.4" transform="rotate(35 145 42)"/>
    <!-- Right ear 3D -->
    <ellipse cx="140" cy="40" rx="16" ry="28" fill="#ff85b8" transform="rotate(30 140 40) rotate(-8 140 40)" filter="url(#dropShadow3D)"/>
    <ellipse cx="140" cy="42" rx="10" ry="20" fill="#ffcceb" transform="rotate(30 140 42) rotate(-8 140 42)"/>
    <!-- Right ear inner shadow -->
    <ellipse cx="142" cy="45" rx="6" ry="12" fill="#ff5588" opacity="0.3" transform="rotate(30 142 45)"/>

    <!-- Horn 3D complex -->
    <!-- Horn shadow behind -->
    <polygon points="100,15 92,75 108,75" fill="#000000" opacity="0.12" transform="translate(2, 2) rotate(-8 100 40)"/>
    <!-- Horn main 3D -->
    <polygon points="100,15 94,75 106,75" fill="url(#hornGrad3D)" filter="url(#dropShadow3D)" transform="rotate(-8 100 40)"/>
    <!-- Horn side shadow -->
    <polygon points="100,15 106,75 108,75 100,15" fill="url(#hornShade3D)" transform="rotate(-8 100 40)"/>
    <!-- Horn light reflection -->
    <polygon class="shine" points="100,20 99,65 101,65" fill="#ffffff" opacity="0.8" transform="rotate(-8 100 40)" filter="url(#glow3D)"/>
    <polygon points="100,25 98.5,60 100.5,60" fill="#fffacd" opacity="0.6" transform="rotate(-8 100 40)"/>

    <!-- Eyes with 3D depth -->
    <!-- Left eye shadow -->
    <circle cx="78" cy="82" r="13" fill="#000000" opacity="0.12" filter="url(#dropShadow3D)" transform="rotate(-8 78 82)"/>
    <!-- Left eye white 3D -->
    <circle cx="78" cy="78" r="11" fill="#ffffff" filter="url(#innerShadow)" transform="rotate(-8 78 78)"/>
    <!-- Left eye shading -->
    <circle cx="82" cy="82" r="10" fill="#000000" opacity="0.08" transform="rotate(-8 82 82)"/>
    <!-- Left eye iris -->
    <circle cx="78" cy="80" r="6" fill="#1a0a2f" transform="rotate(-8 78 80)"/>
    <!-- Left eye iris shine -->
    <circle cx="75" cy="78" r="2" fill="#000000" opacity="0.4" transform="rotate(-8 75 78)"/>
    <!-- Left eye highlight -->
    <circle class="shine" cx="80" cy="76" r="4" fill="#ffffff" transform="rotate(-8 80 76)" filter="url(#glow3D)"/>
    <circle cx="78" cy="82" r="1.5" fill="#ffffff" opacity="0.6" transform="rotate(-8 78 82)"/>

    <!-- Right eye shadow -->
    <circle cx="122" cy="82" r="13" fill="#000000" opacity="0.12" filter="url(#dropShadow3D)" transform="rotate(-8 122 82)"/>
    <!-- Right eye white 3D -->
    <circle cx="122" cy="78" r="11" fill="#ffffff" filter="url(#innerShadow)" transform="rotate(-8 122 78)"/>
    <!-- Right eye shading -->
    <circle cx="118" cy="82" r="10" fill="#000000" opacity="0.08" transform="rotate(-8 118 82)"/>
    <!-- Right eye iris -->
    <circle cx="122" cy="80" r="6" fill="#1a0a2f" transform="rotate(-8 122 80)"/>
    <!-- Right eye iris shine -->
    <circle cx="125" cy="78" r="2" fill="#000000" opacity="0.4" transform="rotate(-8 125 78)"/>
    <!-- Right eye highlight -->
    <circle class="shine" cx="124" cy="76" r="4" fill="#ffffff" transform="rotate(-8 124 76)" filter="url(#glow3D)"/>
    <circle cx="122" cy="82" r="1.5" fill="#ffffff" opacity="0.6" transform="rotate(-8 122 82)"/>

    <!-- Magic sparkles in eyes -->
    <circle cx="70" cy="68" r="2.5" fill="#ffd700" opacity="0.9" class="sparkle3D" transform="rotate(-8 70 68)"/>
    <circle cx="130" cy="68" r="2.5" fill="#ffd700" opacity="0.9" class="sparkle3D" transform="rotate(-8 130 68)"/>

    <!-- Nose 3D -->
    <polygon points="100,105 96,113 104,113" fill="#000000" opacity="0.1" filter="url(#dropShadow3D)" transform="rotate(-8 100 109)"/>
    <polygon points="100,105 96,113 104,113" fill="#ff4d94" filter="url(#dropShadow3D)" transform="rotate(-8 100 109)"/>
    <polygon points="100,105 96,113 100,112" fill="#000000" opacity="0.25" transform="rotate(-8 100 109)"/>

    <!-- Smile 3D -->
    <path d="M 75 120 Q 100 145 125 120" stroke="#ff69b4" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.95" filter="url(#glow3D)"/>
    <path d="M 75 120 Q 100 145 125 120 L 125 132 Q 100 155 75 132 Z" fill="#ff69b4" opacity="0.35" filter="url(#glow3D)"/>
    <!-- Tongue 3D -->
    <ellipse cx="100" cy="140" rx="8" ry="6" fill="#ff4d94" opacity="0.9" filter="url(#dropShadow3D)"/>
    <ellipse cx="100" cy="139" rx="6" ry="3" fill="#ffffff" opacity="0.3"/>

    <!-- Whiskers 3D -->
    <!-- Left whiskers -->
    <line x1="48" y1="85" x2="15" y2="75" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow3D)"/>
    <line x1="48" y1="98" x2="10" y2="105" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow3D)"/>
    <line x1="48" y1="111" x2="15" y2="130" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow3D)"/>
    <!-- Right whiskers -->
    <line x1="152" y1="85" x2="185" y2="75" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow3D)"/>
    <line x1="152" y1="98" x2="190" y2="105" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow3D)"/>
    <line x1="152" y1="111" x2="185" y2="130" stroke="#ffcceb" stroke-width="2.5" stroke-linecap="round" opacity="0.9" filter="url(#glow3D)"/>

    <!-- Blush 3D -->
    <!-- Left blush shadow -->
    <circle cx="45" cy="100" r="18" fill="#000000" opacity="0.08" filter="url(#dropShadow3D)"/>
    <!-- Left blush -->
    <circle cx="45" cy="98" r="16" fill="#ff69b4" opacity="0.65" filter="url(#dropShadow3D)"/>
    <!-- Left blush highlight -->
    <circle cx="42" cy="95" r="8" fill="#ffffff" opacity="0.2"/>

    <!-- Right blush shadow -->
    <circle cx="155" cy="100" r="18" fill="#000000" opacity="0.08" filter="url(#dropShadow3D)"/>
    <!-- Right blush -->
    <circle cx="155" cy="98" r="16" fill="#ff69b4" opacity="0.65" filter="url(#dropShadow3D)"/>
    <!-- Right blush highlight -->
    <circle cx="158" cy="95" r="8" fill="#ffffff" opacity="0.2"/>

    <!-- Eyebrows 3D -->
    <path d="M 70 60 Q 78 50 86 60" stroke="#ff85b8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 114 60 Q 122 50 130 60" stroke="#ff85b8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Eyebrow shadows -->
    <path d="M 70 61 Q 78 51 86 61" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M 114 61 Q 122 51 130 61" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>

    <!-- Arms 3D with depth -->
    <!-- Left arm shadow -->
    <path d="M 55 145 Q 40 112 35 52" stroke="#000000" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.12" filter="url(#dropShadow3D)"/>
    <!-- Left arm -->
    <path d="M 55 145 Q 40 110 35 50" stroke="#ffb3d9" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9" filter="url(#dropShadow3D)"/>
    <!-- Left arm light side -->
    <path d="M 55 143 Q 40 108 35 48" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.25"/>
    <!-- Left hand shadow -->
    <circle cx="32" cy="48" r="12" fill="#000000" opacity="0.12" filter="url(#dropShadow3D)"/>
    <!-- Left hand -->
    <circle cx="32" cy="45" r="10" fill="#ffb3d9" opacity="0.9" filter="url(#dropShadow3D)"/>
    <!-- Left hand highlight -->
    <circle class="shine" cx="30" cy="42" r="5" fill="#ffffff" opacity="0.35"/>

    <!-- Right arm shadow -->
    <path d="M 145 145 Q 160 112 165 52" stroke="#000000" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.12" filter="url(#dropShadow3D)"/>
    <!-- Right arm -->
    <path d="M 145 145 Q 160 110 165 50" stroke="#ffb3d9" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9" filter="url(#dropShadow3D)"/>
    <!-- Right arm light side -->
    <path d="M 145 143 Q 160 108 165 48" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.25"/>
    <!-- Right hand shadow -->
    <circle cx="168" cy="48" r="12" fill="#000000" opacity="0.12" filter="url(#dropShadow3D)"/>
    <!-- Right hand -->
    <circle cx="168" cy="45" r="10" fill="#ffb3d9" opacity="0.9" filter="url(#dropShadow3D)"/>
    <!-- Right hand highlight -->
    <circle class="shine" cx="170" cy="42" r="5" fill="#ffffff" opacity="0.35"/>

    <!-- Hand sparkles -->
    <circle cx="25" cy="35" r="1.5" fill="#ffd700" opacity="0.8" class="sparkle3D"/>
    <circle cx="40" cy="40" r="1.5" fill="#ffed4e" opacity="0.8" class="sparkle3D"/>
    <circle cx="175" cy="35" r="1.5" fill="#ffd700" opacity="0.8" class="sparkle3D"/>
    <circle cx="160" cy="40" r="1.5" fill="#ffed4e" opacity="0.8" class="sparkle3D"/>
  </g>
</svg>
