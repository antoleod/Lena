<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" class="lena-mascot state-correct" role="img" aria-label="Lena mascot correct">
  <defs>
    <radialGradient id="bodyGrad" cx="34%" cy="25%" r="78%">
      <stop offset="0%" stop-color="#fff8fd"/>
      <stop offset="24%" stop-color="#ffd6ec"/>
      <stop offset="62%" stop-color="#ff8fc6"/>
      <stop offset="100%" stop-color="#d8579f"/>
    </radialGradient>
    <radialGradient id="bellyGrad" cx="42%" cy="25%" r="78%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#fff0f8"/>
      <stop offset="100%" stop-color="#ffc6e0"/>
    </radialGradient>
    <linearGradient id="hornGrad" x1="82" y1="8" x2="116" y2="54">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#fff3a3"/>
      <stop offset="70%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="28%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="72%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="55%" stop-color="#c7f9ff" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity=".45"/>
    </linearGradient>
    <linearGradient id="crystalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdff"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#81356f" flood-opacity=".27"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .float-core{animation:float 4.8s ease-in-out infinite;transform-origin:100px 208px;will-change:transform}
      .shadow{animation:shadow 4.8s ease-in-out infinite;transform-origin:center}
      .eye{animation:blink 5.8s infinite;animation-delay:var(--blink-delay);will-change:transform}
      .pupil{animation:look 7s ease-in-out infinite;will-change:transform}
      .highlight{animation:shine 3.8s ease-in-out infinite;will-change:opacity,transform}
      .wing-left{animation:wingL 3.6s ease-in-out infinite;transform-origin:65px 121px}
      .wing-right{animation:wingR 3.6s ease-in-out infinite;transform-origin:135px 121px}
      .arm-left,.arm-right{animation:arm 4.2s ease-in-out infinite;transform-origin:100px 140px}
      .sparkle,.star,.crystal,.thought,.dot,.conf{will-change:transform,opacity}
      .sparkle{animation:twinkle 2.2s ease-in-out infinite}
      .s2{animation-delay:.6s}.s3{animation-delay:1.1s}
      .star{animation:starPulse 2.4s ease-in-out infinite}.st2{animation-delay:.5s}
      .crystal{animation:crystalFloat 3.5s ease-in-out infinite}.c2{animation-delay:.8s}
      .thought{animation:thoughtFloat 2.8s ease-in-out infinite}.t2{animation-delay:.25s}.t3{animation-delay:.5s}
      .dot{animation:dotFloat 3s ease-in-out infinite}.d2{animation-delay:.5s}.d3{animation-delay:1s}
      .conf{animation:confetti 1.7s ease-in-out infinite}.cf2{animation-delay:.15s}.cf3{animation-delay:.3s}.cf4{animation-delay:.45s}.cf5{animation-delay:.6s}.cf6{animation-delay:.75s}
      .state-correct .float-core{animation:bounce .8s cubic-bezier(.2,1.4,.35,1) infinite}
      .state-wrong .float-core{animation:softShake 1.4s ease-in-out infinite}
      .state-celebrate .float-core,.state-levelup .float-core{animation:partyJump 1.15s cubic-bezier(.2,1.3,.35,1) infinite}
      .state-thinking .pupil{animation:thinkLook 2.4s ease-in-out infinite}
      .state-encouraging .arm-right{animation:wave 1.5s ease-in-out infinite;transform-origin:146px 130px}
      @keyframes float{0%,100%{transform:translate3d(0,0,0) rotate(0)}50%{transform:translate3d(0,-7px,0) rotate(-1deg)}}
      @keyframes shadow{0%,100%{transform:scale(1);opacity:.38}50%{transform:scale(.86);opacity:.22}}
      @keyframes blink{0%,92%,100%{transform:scaleY(1)}94%{transform:scaleY(.08)}96%{transform:scaleY(1)}}
      @keyframes look{0%,100%{transform:translate3d(0,0,0)}45%{transform:translate3d(2px,-1px,0)}70%{transform:translate3d(-2px,1px,0)}}
      @keyframes thinkLook{0%,100%{transform:translate3d(2px,-2px,0)}50%{transform:translate3d(-3px,2px,0)}}
      @keyframes shine{0%,100%{opacity:.55;transform:translate3d(0,0,0)}50%{opacity:.95;transform:translate3d(3px,-4px,0)}}
      @keyframes wingL{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(5deg)}}
      @keyframes wingR{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-5deg)}}
      @keyframes arm{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg)}}
      @keyframes wave{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(16deg)}}
      @keyframes twinkle{0%,100%{opacity:.18;transform:scale(.7) rotate(0)}50%{opacity:1;transform:scale(1.15) rotate(16deg)}}
      @keyframes starPulse{0%,100%{opacity:.55;transform:scale(.9)}50%{opacity:1;transform:scale(1.12)}}
      @keyframes crystalFloat{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-8px,0)}}
      @keyframes thoughtFloat{0%,100%{opacity:.5;transform:translate3d(0,0,0)}50%{opacity:.95;transform:translate3d(0,-7px,0)}}
      @keyframes dotFloat{0%,100%{opacity:.35;transform:translate3d(0,0,0)}50%{opacity:.8;transform:translate3d(0,-6px,0)}}
      @keyframes confetti{0%,100%{opacity:.45;transform:translate3d(0,0,0) rotate(0)}50%{opacity:1;transform:translate3d(0,9px,0) rotate(90deg)}}
      @keyframes bounce{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(0,-10px,0) scale(1.04)}}
      @keyframes softShake{0%,100%{transform:translate3d(0,0,0)}25%{transform:translate3d(-2px,0,0) rotate(-1deg)}75%{transform:translate3d(2px,0,0) rotate(1deg)}}
      @keyframes partyJump{0%,100%{transform:translate3d(0,0,0) rotate(0)}45%{transform:translate3d(0,-18px,0) rotate(-3deg)}70%{transform:translate3d(0,-8px,0) rotate(3deg)}}
      @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
    </style>
  </defs>
  <ellipse class="shadow" cx="100" cy="219" rx="55" ry="13" fill="#6b315f" opacity=".35"/>
  
      <g class="sparkles">
        <path class="sparkle s1" d="M35 60 l5 10 10 5 -10 5 -5 10 -5 -10 -10 -5 10 -5Z" fill="#fff3a3"/>
        <path class="sparkle s2" d="M166 46 l4 8 8 4 -8 4 -4 8 -4 -8 -8 -4 8 -4Z" fill="#bff7ff"/>
        <circle class="sparkle s3" cx="31" cy="165" r="4" fill="#ffffff"/>
      </g>

      <g class="stars">
        <path class="star st1" d="M37 35 l7 14 15 2 -11 10 3 15 -14 -8 -14 8 3 -15 -11 -10 15 -2Z" fill="#ffd166"/>
        <path class="star st2" d="M160 28 l6 12 13 2 -10 9 3 13 -12 -7 -12 7 3 -13 -10 -9 13 -2Z" fill="#ffe680"/>
      </g>
  <g class="float-core" filter="url(#softShadow)">
    <path class="wing-left" d="M66 108 C31 88 21 132 52 149 C35 133 42 108 66 108Z" fill="url(#wingGrad)" stroke="#ffffff" stroke-opacity=".75" stroke-width="2"/>
    <path class="wing-right" d="M134 108 C169 88 179 132 148 149 C165 133 158 108 134 108Z" fill="url(#wingGrad)" stroke="#ffffff" stroke-opacity=".75" stroke-width="2"/>
    <path class="arm-left" d="M64 128 C42 112 35 86 51 78" fill="none" stroke="#df5fa8" stroke-width="13" stroke-linecap="round"/>
    <path class="arm-right" d="M136 128 C158 112 165 86 149 78" fill="none" stroke="#df5fa8" stroke-width="13" stroke-linecap="round"/>
    <ellipse cx="100" cy="153" rx="49" ry="59" fill="url(#bodyGrad)"/>
    <ellipse cx="100" cy="163" rx="29" ry="35" fill="url(#bellyGrad)" opacity=".95"/>
    <path d="M82 53 L99 10 L118 53 C108 48 93 48 82 53Z" fill="url(#hornGrad)" stroke="#fff5bd" stroke-width="2"/>
    <path d="M86 36 C97 42 106 42 115 36" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity=".75"/>
    <circle cx="100" cy="84" r="54" fill="url(#bodyGrad)"/>
    <path d="M63 81 C71 47 130 42 139 82 C129 61 78 60 63 81Z" fill="#fff6fb" opacity=".55"/>
    <path d="M54 53 C43 42 39 24 49 15 C64 19 75 34 78 49Z" fill="url(#bodyGrad)" stroke="#f8b3d8" stroke-width="2"/>
    <path d="M146 53 C157 42 161 24 151 15 C136 19 125 34 122 49Z" fill="url(#bodyGrad)" stroke="#f8b3d8" stroke-width="2"/>
    <path d="M60 58 C49 61 39 69 33 81 C48 75 58 77 66 85Z" fill="#c7f9ff" opacity=".9"/>
    <path d="M140 58 C151 61 161 69 167 81 C152 75 142 77 134 85Z" fill="#c7f9ff" opacity=".9"/>
    <path d="M70 64 C78 61 86 61 93 64" fill="none" stroke="#7a2f66" stroke-width="4" stroke-linecap="round" opacity=".75"/>
    <path d="M108 64 C116 61 124 61 132 64" fill="none" stroke="#7a2f66" stroke-width="4" stroke-linecap="round" opacity=".75"/>
    
    <g class="eye eye-left" style="--blink-delay:0s; transform-origin:78px 84px">
      <ellipse cx="78" cy="84" rx="15.9" ry="19.080000000000002" fill="url(#eyeGrad)" stroke="#4a2e79" stroke-width="2.8"/>
      <circle class="pupil" cx="78" cy="86" r="7.2" fill="#2b205f"/>
      <circle cx="71" cy="75" r="4.2" fill="#fff"/>
      <circle cx="82" cy="81" r="1.9" fill="#bff7ff" opacity=".9"/>
    </g>
    
    <g class="eye eye-right" style="--blink-delay:.05s; transform-origin:122px 84px">
      <ellipse cx="122" cy="84" rx="15.9" ry="19.080000000000002" fill="url(#eyeGrad)" stroke="#4a2e79" stroke-width="2.8"/>
      <circle class="pupil" cx="122" cy="86" r="7.2" fill="#2b205f"/>
      <circle cx="115" cy="75" r="4.2" fill="#fff"/>
      <circle cx="126" cy="81" r="1.9" fill="#bff7ff" opacity=".9"/>
    </g>
    <ellipse cx="100" cy="99" rx="7" ry="5" fill="#d8579f" opacity=".7"/>
    <path d="M80 106 C91 121 111 121 122 106" fill="none" stroke="#7a2f66" stroke-width="5" stroke-linecap="round"/>
    <ellipse class="highlight" cx="76" cy="63" rx="13" ry="8" fill="#ffffff" opacity=".54"/>
    <ellipse class="highlight" cx="83" cy="136" rx="16" ry="10" fill="#ffffff" opacity=".35"/>
    <circle cx="63" cy="101" r="6" fill="#ff78b8" opacity=".45"/>
    <circle cx="137" cy="101" r="6" fill="#ff78b8" opacity=".45"/>
    <ellipse cx="78" cy="213" rx="16" ry="8" fill="#d8579f"/>
    <ellipse cx="122" cy="213" rx="16" ry="8" fill="#d8579f"/>
  </g>
</svg>
