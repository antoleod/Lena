<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="headGradHappy" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffb3d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff85b8;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="hornGradHappy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="30%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0a000;stop-opacity:1" />
    </linearGradient>
    <style>
      .shine {
        transition: transform 0.4s ease-out;
      }
      svg:hover .shine {
        transform: translate(3px, -3px);
      }
    </style>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Body -->
  <ellipse cx="100" cy="170" rx="42" ry="50" fill="#ffb3d9" opacity="0.85"/>
  <ellipse cx="100" cy="160" rx="38" ry="30" fill="#ffcceb" opacity="0.5"/>

  <!-- Head -->
  <circle cx="100" cy="85" r="55" fill="url(#headGradHappy)" filter="url(#softShadow)"/>

  <!-- Head shine (3D effect) -->
  <ellipse class="shine" cx="70" cy="60" rx="25" ry="30" fill="#ffcceb" opacity="0.5"/>

  <!-- Left ear back -->
  <ellipse cx="60" cy="40" rx="16" ry="28" fill="#ff85b8" transform="rotate(-30 60 40)"/>
  <!-- Left ear front -->
  <ellipse cx="60" cy="42" rx="10" ry="20" fill="#ffcceb" transform="rotate(-30 60 42)"/>

  <!-- Right ear back -->
  <ellipse cx="140" cy="40" rx="16" ry="28" fill="#ff85b8" transform="rotate(30 140 40)"/>
  <!-- Right ear front -->
  <ellipse cx="140" cy="42" rx="10" ry="20" fill="#ffcceb" transform="rotate(30 140 42)"/>

  <!-- Horn -->
  <polygon points="100,15 94,75 106,75" fill="url(#hornGradHappy)" filter="url(#softShadow)"/>
  <!-- Horn shine line -->
  <polygon class="shine" points="100,20 98,65 102,65" fill="#ffffff" opacity="0.7"/>

  <!-- Left eye white -->
  <circle cx="78" cy="78" r="11" fill="#ffffff" filter="url(#softShadow)"/>
  <!-- Left eye iris -->
  <circle cx="78" cy="80" r="7" fill="#2a1a3f"/>
  <!-- Left eye highlight -->
  <circle class="shine" cx="80" cy="76" r="3.5" fill="#ffffff"/>
  <circle class="shine" cx="76" cy="82" r="1.5" fill="#ffffff" opacity="0.6"/>

  <!-- Right eye white -->
  <circle cx="122" cy="78" r="11" fill="#ffffff" filter="url(#softShadow)"/>
  <!-- Right eye iris -->
  <circle cx="122" cy="80" r="7" fill="#2a1a3f"/>
  <!-- Right eye highlight -->
  <circle class="shine" cx="124" cy="76" r="3.5" fill="#ffffff"/>
  <circle class="shine" cx="120" cy="82" r="1.5" fill="#ffffff" opacity="0.6"/>

  <!-- Left eye squint (happy) -->
  <path d="M 70 90 Q 78 92 86 88" stroke="#ffb3d9" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Right eye squint (happy) -->
  <path d="M 114 90 Q 122 92 130 88" stroke="#ffb3d9" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Nose (pink triangle) -->
  <polygon points="100,105 96,113 104,113" fill="#ff4d94" filter="url(#softShadow)"/>

  <!-- Big smile (happy) -->
  <path d="M 80 118 Q 100 135 120 118" stroke="#ff69b4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Smile fill -->
  <path d="M 80 118 Q 100 132 120 118 L 120 125 Q 100 140 80 125 Z" fill="#ff69b4" opacity="0.2"/>

  <!-- Left whiskers -->
  <line x1="48" y1="85" x2="15" y2="80" stroke="#ffcceb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="98" x2="15" y2="105" stroke="#ffcceb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="111" x2="15" y2="125" stroke="#ffcceb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Right whiskers -->
  <line x1="152" y1="85" x2="185" y2="80" stroke="#ffcceb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="152" y1="98" x2="185" y2="105" stroke="#ffcceb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="152" y1="111" x2="185" y2="125" stroke="#ffcceb" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Left blush (bigger for happy) -->
  <circle cx="48" cy="95" r="12" fill="#ff69b4" opacity="0.3" filter="url(#softShadow)"/>
  <!-- Right blush (bigger for happy) -->
  <circle cx="152" cy="95" r="12" fill="#ff69b4" opacity="0.3" filter="url(#softShadow)"/>

  <!-- Happy eyebrows -->
  <path d="M 70 68 Q 78 62 86 68" stroke="#ff85b8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 114 68 Q 122 62 130 68" stroke="#ff85b8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
