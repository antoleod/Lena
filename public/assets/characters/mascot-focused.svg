<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mascotFocusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <circle cx="60" cy="70" r="35" fill="url(#mascotFocusGrad)" opacity="0.9"/>
  <!-- Head -->
  <circle cx="60" cy="35" r="25" fill="url(#mascotFocusGrad)" opacity="0.95"/>
  <!-- Eyes - focused -->
  <circle cx="50" cy="32" r="3.5" fill="#FFF"/>
  <circle cx="70" cy="32" r="3.5" fill="#FFF"/>
  <circle cx="50" cy="32" r="2" fill="#000" opacity="0.9"/>
  <circle cx="70" cy="32" r="2" fill="#000" opacity="0.9"/>
  <!-- Eyebrows - concentrated -->
  <path d="M 45 25 Q 50 23 55 25" stroke="#FFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 65 25 Q 70 23 75 25" stroke="#FFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Neutral mouth -->
  <line x1="48" y1="42" x2="72" y2="42" stroke="#FFF" stroke-width="1.5" opacity="0.6"/>
  <!-- Arms -->
  <rect x="25" y="60" width="15" height="30" rx="7" fill="url(#mascotFocusGrad)" opacity="0.85"/>
  <rect x="80" y="60" width="15" height="30" rx="7" fill="url(#mascotFocusGrad)" opacity="0.85"/>
  <!-- Hands -->
  <circle cx="32" cy="92" r="8" fill="url(#mascotFocusGrad)" opacity="0.9"/>
  <circle cx="88" cy="92" r="8" fill="url(#mascotFocusGrad)" opacity="0.9"/>
</svg>
