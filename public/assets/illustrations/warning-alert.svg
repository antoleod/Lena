<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#warningGrad)" opacity="0.15"/>
  <!-- Warning triangle outline -->
  <polygon points="100,40 170,160 30,160" fill="none" stroke="#ffb74d" stroke-width="4" stroke-linejoin="round" opacity="0.8"/>
  <!-- Exclamation mark -->
  <circle cx="100" cy="130" r="6" fill="#ffb74d" opacity="0.9"/>
  <line x1="100" y1="80" x2="100" y2="115" stroke="#ffb74d" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
</svg>
