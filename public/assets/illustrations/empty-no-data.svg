<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b9e4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a2d8e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#emptyGrad)" opacity="0.3"/>
  <!-- Box/Container -->
  <rect x="60" y="70" width="80" height="70" rx="8" fill="none" stroke="#b9d3e0" stroke-width="3" opacity="0.6"/>
  <!-- X mark -->
  <line x1="75" y1="85" x2="95" y2="115" stroke="#b9d3e0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="95" y1="85" x2="75" y2="115" stroke="#b9d3e0" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Decorative circles -->
  <circle cx="110" cy="65" r="4" fill="#b9d3e0" opacity="0.4"/>
  <circle cx="130" cy="80" r="3" fill="#b9d3e0" opacity="0.3"/>
</svg>
