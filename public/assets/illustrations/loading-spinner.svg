<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="loadingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .spinner { animation: spin 1s linear infinite; transform-origin: 60px 60px; }
    </style>
  </defs>
  <g class="spinner">
    <circle cx="60" cy="20" r="8" fill="url(#loadingGrad)" opacity="1"/>
    <circle cx="85" cy="30" r="8" fill="url(#loadingGrad)" opacity="0.8"/>
    <circle cx="100" cy="60" r="8" fill="url(#loadingGrad)" opacity="0.6"/>
    <circle cx="85" cy="90" r="8" fill="url(#loadingGrad)" opacity="0.4"/>
    <circle cx="60" cy="100" r="8" fill="url(#loadingGrad)" opacity="0.3"/>
  </g>
</svg>
