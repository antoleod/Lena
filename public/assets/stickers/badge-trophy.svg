<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Insignia de Trofeo Master 3D</title>
  <defs>
    <filter id="elementGlowTrophy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#FFB74D" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="stickerShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="surfaceGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="50%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="badgeBodyTrophy" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFCC80" />
      <stop offset="70%" stop-color="#EF6C00" />
      <stop offset="100%" stop-color="#BF360C" />
    </radialGradient>
  </defs>

  <g filter="url(#stickerShadow)">
    <circle cx="50" cy="53" r="48" fill="#5D1B06" /> 
    <circle cx="50" cy="50" r="48" fill="#FFFFFF" />
    <circle cx="50" cy="50" r="44" fill="url(#badgeBodyTrophy)" />
    <!-- Trofeo -->
    <path d="M 35 25 L 65 25 L 62 45 C 60 55 55 60 50 60 C 45 60 40 55 38 45 Z M 42 60 L 58 60 L 58 70 L 42 70 Z M 38 70 L 62 70 L 65 78 L 35 78 Z" 
          fill="#FFE082" filter="url(#elementGlowTrophy)" />
    <path d="M 40 28 L 60 28 L 58 42 C 55 50 50 50 50 50 C 50 50 45 50 42 42 Z" fill="white" opacity="0.4" />
    <path d="M 12 40 A 40 40 0 0 1 80 20 A 44 44 0 0 0 12 40" fill="url(#surfaceGloss)" />
  </g>
</svg>