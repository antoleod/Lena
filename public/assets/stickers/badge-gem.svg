<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Insignia de Gema Master 3D</title>
  <defs>
    <filter id="elementGlowGem" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#CE93D8" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="stickerShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="surfaceGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="50%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="badgeBodyGem" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#E1BEE7" />
      <stop offset="70%" stop-color="#8E24AA" />
      <stop offset="100%" stop-color="#4A148C" />
    </radialGradient>
  </defs>

  <g filter="url(#stickerShadow)">
    <circle cx="50" cy="53" r="48" fill="#2A004D" /> 
    <circle cx="50" cy="50" r="48" fill="#FFFFFF" />
    <circle cx="50" cy="50" r="44" fill="url(#badgeBodyGem)" />
    <!-- Gema -->
    <path d="M 50 20 L 75 40 L 50 80 L 25 40 Z" fill="#BA68C8" filter="url(#elementGlowGem)" />
    <path d="M 50 20 L 75 40 L 50 45 L 25 40 Z" fill="#E1BEE7" opacity="0.6" />
    <path d="M 50 20 L 50 45 L 25 40 Z" fill="white" opacity="0.4" />
    <path d="M 12 40 A 40 40 0 0 1 80 20 A 44 44 0 0 0 12 40" fill="url(#surfaceGloss)" />
  </g>
</svg>