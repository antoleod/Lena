<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Sticker Estrella Feliz 3D</title>
  <defs>
    <filter id="stickerShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="starBody" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF59D" />
      <stop offset="100%" stop-color="#FBC02D" />
    </radialGradient>
  </defs>
  <g filter="url(#stickerShadow)">
    <!-- Borde Blanco -->
    <path d="M 50 10 L 63 38 L 93 42 L 71 63 L 78 93 L 50 78 L 22 93 L 29 63 L 7 42 L 37 38 Z" 
          fill="white" stroke="white" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Estrella con volumen -->
    <path d="M 50 10 L 63 38 L 93 42 L 71 63 L 78 93 L 50 78 L 22 93 L 29 63 L 7 42 L 37 38 Z" 
          fill="url(#starBody)" />

    <!-- Cara (Para hacerla "viva") -->
    <circle cx="40" cy="50" r="3" fill="#5D4037" />
    <circle cx="60" cy="50" r="3" fill="#5D4037" />
    <path d="M 42 62 Q 50 68 58 62" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Brillo especular -->
    <path d="M 50 20 L 58 38 L 45 35 Z" fill="white" opacity="0.4" />
  </g>
</svg>