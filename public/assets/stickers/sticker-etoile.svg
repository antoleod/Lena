<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Sticker Estrella Master 3D Animada</title>
  <defs>
    <filter id="stickerShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="starBody" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF59D" />
      <stop offset="100%" stop-color="#FBC02D" />
    </radialGradient>
    <linearGradient id="surfaceGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6" />
      <stop offset="40%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g filter="url(#stickerShadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    <!-- Borde Blanco -->
    <path d="M 50 10 L 63 38 L 93 42 L 71 63 L 78 93 L 50 78 L 22 93 L 29 63 L 7 42 L 37 38 Z" 
          fill="white" stroke="white" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Estrella con volumen -->
    <path d="M 50 10 L 63 38 L 93 42 L 71 63 L 78 93 L 50 78 L 22 93 L 29 63 L 7 42 L 37 38 Z" 
          fill="url(#starBody)" />
    <!-- Reflejo de cristal -->
    <path d="M 15 45 A 40 40 0 0 1 85 30 A 45 45 0 0 0 15 45" fill="url(#surfaceGloss)" />
    <!-- Cara (Para hacerla "viva") -->
    <g>
      <circle cx="40" cy="50" r="3" fill="#5D4037" />
      <circle cx="60" cy="50" r="3" fill="#5D4037" />
      <!-- Animación de parpadeo -->
      <rect x="36" y="49" width="8" height="2" fill="#FBC02D" opacity="0"><animate attributeName="opacity" values="0;0;1;0;0" dur="4s" repeatCount="indefinite" /></rect>
      <rect x="56" y="49" width="8" height="2" fill="#FBC02D" opacity="0"><animate attributeName="opacity" values="0;0;1;0;0" dur="4s" repeatCount="indefinite" /></rect>
    </g>
    <path d="M 42 62 Q 50 68 58 62" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Brillo especular -->
    <path d="M 50 20 L 58 38 L 45 35 Z" fill="white" opacity="0.4" />
  </g>
</svg>