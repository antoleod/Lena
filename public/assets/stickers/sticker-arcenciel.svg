<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Sticker Arcoíris Master 3D</title>
  <defs>
    <filter id="stickerShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="surfaceGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6" />
      <stop offset="40%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g filter="url(#stickerShadow)">
    <!-- Borde troquelado blanco -->
    <path d="M 15 65 A 35 35 0 0 1 85 65 L 90 70 L 10 70 Z" fill="white" transform="scale(1.1) translate(-5, -5)" />
    <circle cx="50" cy="50" r="48" fill="white" />
    
    <!-- Cuerpo Arcoíris -->
    <circle cx="50" cy="50" r="44" fill="#F5F5F5" />
    <g transform="translate(0, 5)">
      <path d="M 20 65 A 30 30 0 0 1 80 65" fill="none" stroke="#FF5252" stroke-width="8" stroke-linecap="round" />
      <path d="M 28 65 A 22 22 0 0 1 72 65" fill="none" stroke="#FFD740" stroke-width="8" stroke-linecap="round" />
      <path d="M 36 65 A 14 14 0 0 1 64 65" fill="none" stroke="#40C4FF" stroke-width="8" stroke-linecap="round" />
    </g>

    <!-- Nubes 3D -->
    <g>
      <circle cx="30" cy="65" r="12" fill="white" />
      <circle cx="30" cy="67" r="10" fill="#E1F5FE" opacity="0.5" />
      <animateTransform attributeName="transform" type="translate" values="0,0; -1.5,1; 0,0" dur="3s" repeatCount="indefinite" />
    </g>
    <g>
      <circle cx="70" cy="65" r="12" fill="white" />
      <circle cx="70" cy="67" r="10" fill="#E1F5FE" opacity="0.5" />
      <animateTransform attributeName="transform" type="translate" values="0,0; 1.5,-1; 0,0" dur="4s" repeatCount="indefinite" />
    </g>

    <!-- Reflejo de cristal -->
    <path d="M 15 45 A 40 40 0 0 1 85 30 A 45 45 0 0 0 15 45" fill="url(#surfaceGloss)" />
  </g>
</svg>