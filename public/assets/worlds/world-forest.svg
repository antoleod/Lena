<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Mundo Bosque 3D</title>
  <defs>
    <radialGradient id="forestBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#A5D6A7" />
      <stop offset="100%" stop-color="#2E7D32" />
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base de la esfera -->
  <circle cx="50" cy="50" r="46" fill="url(#forestBg)" stroke="white" stroke-width="3" />
  
  <!-- Árbol 3D central -->
  <g filter="url(#softGlow)">
    <!-- Tronco -->
    <rect x="46" y="60" width="8" height="15" fill="#5D4037" rx="2" />
    <!-- Hojas (Capas de verde) -->
    <circle cx="50" cy="45" r="22" fill="#81C784" />
    <circle cx="42" cy="40" r="12" fill="#A5D6A7" opacity="0.8" />
    <circle cx="50" cy="45" r="18" fill="none" stroke="#43A047" stroke-width="1" opacity="0.3" />
  </g>
  
  <!-- Reflejo curvo superior -->
  <path d="M 25 25 A 35 35 0 0 1 75 25 A 40 40 0 0 0 25 25" fill="white" opacity="0.3" />
</svg>