<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="galaxyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e8dff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6f70e8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#galaxyGrad)" opacity="0.9"/>

  <!-- Stars -->
  <circle cx="40" cy="40" r="2" fill="#FFF" opacity="0.8" filter="url(#glow)"/>
  <circle cx="160" cy="50" r="2.5" fill="#FFD700" opacity="0.7" filter="url(#glow)"/>
  <circle cx="70" cy="75" r="1.5" fill="#FFF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="130" cy="85" r="2" fill="#FFB2DC" opacity="0.7" filter="url(#glow)"/>
  <circle cx="50" cy="130" r="1.8" fill="#FFF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="150" cy="140" r="2.2" fill="#FFB2DC" opacity="0.6" filter="url(#glow)"/>
  <circle cx="100" cy="160" r="1.5" fill="#FFF" opacity="0.4" filter="url(#glow)"/>

  <!-- Galaxy core -->
  <circle cx="100" cy="100" r="20" fill="#FF9AD1" opacity="0.3"/>
  <circle cx="100" cy="100" r="15" fill="#C6B3FF" opacity="0.2"/>
</svg>
