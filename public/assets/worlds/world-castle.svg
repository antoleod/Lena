<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="castleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1b8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b493eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#castleGrad)" opacity="0.9"/>

  <!-- Castle base -->
  <rect x="50" y="100" width="100" height="60" fill="#7A5C8C" opacity="0.8"/>

  <!-- Towers -->
  <rect x="35" y="80" width="15" height="80" fill="#6B4B7A" opacity="0.8"/>
  <polygon points="35,75 42.5,65 50,75" fill="#6B4B7A" opacity="0.8"/>
  <rect x="150" y="80" width="15" height="80" fill="#6B4B7A" opacity="0.8"/>
  <polygon points="150,75 157.5,65 165,75" fill="#6B4B7A" opacity="0.8"/>

  <!-- Center tower -->
  <rect x="90" y="60" width="20" height="100" fill="#8A6B9A" opacity="0.8"/>
  <polygon points="90,55 100,40 110,55" fill="#8A6B9A" opacity="0.8"/>

  <!-- Flag -->
  <rect x="98" y="35" width="2" height="15" fill="#FFB2DC" opacity="0.8"/>
  <polygon points="100,35 100,42 110,39" fill="#FFB2DC" opacity="0.8"/>

  <!-- Windows -->
  <circle cx="60" cy="110" r="3" fill="#FFF" opacity="0.4"/>
  <circle cx="100" cy="85" r="3" fill="#FFF" opacity="0.5"/>
  <circle cx="140" cy="110" r="3" fill="#FFF" opacity="0.4"/>
</svg>
