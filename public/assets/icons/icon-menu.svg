<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Menú 3D Minimalista</title>
  <defs>
    <filter id="menuShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C5B2FF" />
      <stop offset="100%" stop-color="#9176FF" />
    </linearGradient>
  </defs>
  <g filter="url(#menuShadow)">
    <!-- Barras tipo "cápsula" con profundidad interna -->
    <rect x="15" y="24" width="70" height="10" rx="5" fill="url(#barGrad)"/>
    <rect x="15" y="24" width="70" height="4" rx="5" fill="white" opacity="0.3"/>
    <rect x="15" y="45" width="70" height="10" rx="5" fill="url(#barGrad)"/>
    <rect x="15" y="45" width="70" height="4" rx="5" fill="white" opacity="0.3"/>
    <rect x="15" y="66" width="70" height="10" rx="5" fill="url(#barGrad)"/>
    <rect x="15" y="66" width="70" height="4" rx="5" fill="white" opacity="0.3"/>
  </g>
</svg>
