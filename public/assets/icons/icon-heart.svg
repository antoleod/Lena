<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Corazón Premium 3D</title>
  <defs>
    <filter id="heartShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="heartBody" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FF8FAB" />
      <stop offset="60%" stop-color="#F06292" />
      <stop offset="100%" stop-color="#C2185B" />
    </radialGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g filter="url(#heartShadow)">
    <animateTransform attributeName="transform" type="scale" values="1; 1.08; 1" dur="0.8s" repeatCount="indefinite" pivot="50,50" />
    <path d="M 50 85 C 30 70 15 60 15 45 C 15 35 22 28 30 28 C 38 28 45 35 50 42 C 55 35 62 28 70 28 C 78 28 85 35 85 45 C 85 60 70 70 50 85 Z" fill="url(#heartBody)"/>
    <!-- Upper gloss -->
    <path d="M 30 28 C 22 28 15 35 15 45 C 15 50 20 55 30 60 C 40 55 50 50 50 42 C 50 35 43 28 35 28 C 33 28 31 28.5 30 29 Z" fill="url(#gloss)" opacity="0.4" />
  </g>
</svg>
