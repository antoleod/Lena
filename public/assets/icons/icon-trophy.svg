<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Trofeo Premium 3D</title>
  <defs>
    <filter id="trophyShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="trophyBody" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="60%" stop-color="#FFA000" />
      <stop offset="100%" stop-color="#E65100" />
    </radialGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g filter="url(#trophyShadow)">
    <!-- Cuerpo de la copa -->
    <path d="M 30 20 H 70 L 65 50 Q 65 65 50 65 Q 35 65 35 50 Z" fill="url(#trophyBody)"/>
    <!-- Asas -->
    <path d="M 30 25 C 20 25 20 45 30 45 M 70 25 C 80 25 80 45 70 45" fill="none" stroke="#FFA000" stroke-width="4" stroke-linecap="round" />
    <!-- Base -->
    <rect x="42" y="65" width="16" height="10" fill="#E65100" />
    <rect x="30" y="75" width="40" height="8" rx="2" fill="#E65100" />
    <!-- Brillo superior -->
    <path d="M 30 20 L 70 20 L 68 35 L 32 35 Z" fill="url(#gloss)" opacity="0.4" />
  </g>
</svg>
