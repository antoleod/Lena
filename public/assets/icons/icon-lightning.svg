<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Rayo Premium 3D</title>
  <defs>
    <filter id="boltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#FFD600" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="boltBody" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFF9C4" />
      <stop offset="70%" stop-color="#FBC02D" />
      <stop offset="100%" stop-color="#F57F17" />
    </radialGradient>
  </defs>
  <polygon points="50,15 35,45 50,45 35,85 65,35 50,35 65,15" fill="url(#boltBody)" filter="url(#boltGlow)"/>
  <!-- Highlight -->
  <path d="M 50 15 L 35 45 L 50 45 L 43 65 L 65 15 Z" fill="white" opacity="0.4" />
</svg>
