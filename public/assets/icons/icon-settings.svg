<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Ajustes 3D Minimalista</title>
  <defs>
    <filter id="gearShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="gearGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#D1D1D1" />
      <stop offset="100%" stop-color="#808080" />
    </radialGradient>
  </defs>
  <g filter="url(#gearShadow)">
    <!-- Engranaje con volumen esférico -->
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
    <path d="M 50 32 A 18 18 0 1 0 50 68 A 18 18 0 1 0 50 32 M 44 14 H 56 V 26 H 44 Z M 44 74 H 56 V 86 H 44 Z M 14 44 H 26 V 56 H 14 Z M 74 44 H 86 V 56 H 74 Z M 24 24 L 33 33 L 26 40 L 17 31 Z M 67 67 L 76 76 L 83 69 L 74 60 Z M 24 76 L 17 69 L 26 60 L 33 69 Z M 67 33 L 74 40 L 83 31 L 76 24 Z" fill="url(#gearGrad)"/>
    <!-- Hueco central y reflejos -->
    <circle cx="50" cy="50" r="12" fill="black" opacity="0.1" />
    <circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="2" opacity="0.2" />
    <circle cx="50" cy="50" r="8" fill="white" opacity="0.1"/>
  </g>
</svg>
