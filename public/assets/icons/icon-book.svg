<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>Libro Premium 3D</title>
  <defs>
    <filter id="bookShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <radialGradient id="bookCover" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFAB91" />
      <stop offset="60%" stop-color="#FF7043" />
      <stop offset="100%" stop-color="#D84315" />
    </radialGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g filter="url(#bookShadow)">
    <!-- Portada -->
    <path d="M 25 20 L 50 25 L 75 20 V 75 Q 75 80 70 80 L 50 80 L 30 80 Q 25 80 25 75 V 20" fill="url(#bookCover)"/>
    <!-- Efecto de páginas -->
    <path d="M 50 25 L 75 20 V 75 Q 75 80 70 80 L 50 80 Z" fill="white" opacity="0.1"/>
    <line x1="50" y1="25" x2="50" y2="80" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <path d="M 35 40 H 45 M 55 40 H 65 M 35 55 H 45 M 55 55 H 65" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <path d="M 25 20 L 50 25 V 80 L 30 80 Q 25 80 25 75 Z" fill="url(#gloss)" opacity="0.3" />
  </g>
</svg>
